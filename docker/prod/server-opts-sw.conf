# The service worker file itself must never be cached long-term, or a broken
# deploy becomes unrecoverable without users manually clearing site data.
# NOTE: this must be a server-opts.d file (included inside the `server {}`
# block, see site-opts.d/http.conf.template), not conf.d (http-level) —
# `location` is not valid at the http level.
location = /sw.js {
    add_header Cache-Control "no-cache";
}
