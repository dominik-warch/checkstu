# checkstu nginx tweaks (merged into the serversideup server block).
# NOTE: the base image already sets client_max_body_size and gzip — do not
# redeclare them here or nginx aborts with "duplicate directive".

# Quieter logs
access_log off;

# The service worker file itself must never be cached long-term, or a broken
# deploy becomes unrecoverable without users manually clearing site data.
location = /sw.js {
    add_header Cache-Control "no-cache";
}
