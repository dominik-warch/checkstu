<!doctype html>
<html lang="de">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>checkstu – offline</title>
        <style>
            :root {
                color-scheme: light dark;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family:
                    system-ui,
                    -apple-system,
                    'Segoe UI',
                    sans-serif;
                background: #ffffff;
                color: #1f2937;
                text-align: center;
                padding: 1.5rem;
            }

            @media (prefers-color-scheme: dark) {
                body {
                    background: #0b0b0f;
                    color: #f3f4f6;
                }
            }

            .card {
                max-width: 24rem;
            }

            .dot {
                width: 3rem;
                height: 3rem;
                border-radius: 9999px;
                background: #4f46e5;
                margin: 0 auto 1rem;
            }

            h1 {
                font-size: 1.25rem;
                margin: 0 0 0.5rem;
            }

            p {
                margin: 0;
                opacity: 0.75;
                line-height: 1.5;
            }

            button {
                margin-top: 1.5rem;
                padding: 0.625rem 1.5rem;
                border: none;
                border-radius: 9999px;
                background: #4f46e5;
                color: #ffffff;
                font: inherit;
                font-weight: 500;
                cursor: pointer;
            }

            button:disabled {
                opacity: 0.6;
                cursor: default;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="dot"></div>
            <h1>Keine Verbindung</h1>
            <p>checkstu kann gerade nicht geladen werden. Bitte prüfe deine Internetverbindung und versuche es erneut.</p>
            <button id="retry" type="button">Erneut versuchen</button>
        </div>
        <script>
            // Retry just re-navigates to the app; if still offline, the service
            // worker's navigate fallback re-serves this same page (see sw.js).
            var goHome = function () {
                window.location.href = '/';
            };

            document.getElementById('retry').addEventListener('click', function () {
                this.disabled = true;
                this.textContent = 'Wird geprüft …';
                goHome();
            });

            // No-tap recovery: the moment the browser regains connectivity,
            // head straight back to the app instead of waiting to be killed
            // and relaunched from the app drawer.
            window.addEventListener('online', goHome);
        </script>
    </body>
</html>
